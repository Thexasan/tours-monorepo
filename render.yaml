# Render Infrastructure as Code: https://render.com/docs/yaml-spec
#
# При первом подключении репозитория к Render создаст Web Service по этой спеке.
# Env-переменные нужно задать через UI Render (раздел "Environment") или через "Secret Files".
#
# Требуемые переменные:
#   DATABASE_URL          — postgresql:// от Neon (с ?sslmode=require)
#   JWT_SECRET            — длинная случайная строка (>= 32 символа)
#   JWT_REFRESH_SECRET    — другая длинная случайная строка
#   WEB_ORIGIN            — https://tours-monorepo-web.vercel.app
#   COOKIE_DOMAIN         — оставить пустым (cross-site cookies)
#   APP_URL               — https://tours-monorepo-web.vercel.app
#   RESEND_API_KEY        — опционально; если пусто, emails логируются в stdout

services:
  - type: web
    name: tours-api
    runtime: node
    region: frankfurt          # ближе к Neon EU и пользователям из СНГ
    plan: free
    branch: main
    rootDir: .
    buildCommand: |
      npm install --include=dev
      cd packages/db && npx prisma generate
      cd ../../apps/api && npm run build
    startCommand: cd apps/api && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000           # Render передаёт свой PORT, но фиксируем дефолт
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_FROM
        value: "Tours <onboarding@resend.dev>"
      # Все секреты задаются вручную через Render UI:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
