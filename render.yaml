# Render Infrastructure as Code: https://render.com/docs/yaml-spec
services:
  - type: web
    name: tours-api
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    buildCommand: |
      npm install --include=dev
      cd packages/types && npm run build
      cd ../db && npx prisma generate && npm run build
      cd ../../apps/api && npm run build
    startCommand: cd apps/api && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_FROM
        value: "Tours <onboarding@resend.dev>"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
